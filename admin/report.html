<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reports</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="navbar bg-primary border-bottom border-body navbar-expand-lg sticky-top" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">NextGen Digital Library</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav" id="left-list">
          <li class="nav-item">
            <a href="../shop/resources.html" class="nav-link p-2">Resources</a>
          </li>
          <!-- Added authentication-based nav links dynatically -->
        </ul>
        <ul class="navbar-nav ms-auto" id="right-list">
          <!-- Add login/signup or logout links here -->
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="container mt-3">
      <div class="row">
        <div class="col-md-6">
          <div class="row align-items-center g2">
            <div class="col-auto">
              <label for="sort-by" class="col-form-label">Report Status: </label>
            </div>
            <div class="col">
              <select id="report" class="form-select">
                  <option value="all">All</option>
                  <option value="returned">Returned</option>
                  <option value="not-returned">Not Returned</option>
              </select>
            </div>
            <div class="col-auto">
              <button type="button" class="btn btn-primary" onclick="report()" style="margin-bottom: 5px;">Report</button>
            </div>

          </div>
        </div>

      </div>
    </div>
    <div class="container mt-4">
      <div id="resource-grid">
        <!-- Resources will be loaded here dynamically -->
      </div>
    </div>
  </main>
  <script src="../js/admin.js"></script>
</body>
</html>
